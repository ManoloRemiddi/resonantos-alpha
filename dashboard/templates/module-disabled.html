{% extends "base.html" %}
{% block title %}{{ module_name }} - Not Enabled{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;color:var(--text-muted)">
    <div style="font-size:64px;margin-bottom:24px">🔒</div>
    <h2 style="color:var(--text-primary);margin-bottom:12px">{{ module_name }} is not enabled</h2>
    <p style="margin-bottom:24px;max-width:400px">This module is available as an add-on. Enable it from the Module Store or Settings to access this feature.</p>
    <a href="/settings" style="color:var(--accent);text-decoration:none">Go to Settings -&gt;</a>
</div>
{% endblock %}
