services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resonantos-dashboard
    # network_mode: host  # Linux only — uncomment if running on Linux
    ports:
      - "19100:19100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OPENCLAW_HOME}/.openclaw:/root/.openclaw:ro
      - ./dashboard/config.json:/app/config.json:ro
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:19100/', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
