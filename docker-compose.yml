services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resonantos-dashboard
    network_mode: host  # Set by install.js on Linux; not available on Docker Desktop
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OPENCLAW_HOME}/.openclaw:/root/.openclaw
      - ./dashboard/config.json:/app/config.json:ro
      - ${HOME}/.nvm/versions/node/v22.20.0/lib/node_modules:/root/.local-nvm/lib/node_modules:ro
      - ${HOME}/.nvm/versions/node/v22.20.0/node_modules:/root/.local-nvm/node_modules:ro
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PATH=/root/.local-nvm/bin:/root/.local-nvm/node_modules/openclaw/node_modules/.bin:/root/.local-nvm/lib/node_modules/.bin:${PATH}
      - NODE_PATH=/root/.local-nvm/node_modules:/root/.local-nvm/lib/node_modules
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:19100/', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
